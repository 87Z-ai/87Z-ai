<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        /* Klassisches Win95 Design */
        body { background-color: #c0c0c0; font-family: 'MS Sans Serif', 'Arial', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .win95-window { background-color: #c0c0c0; border: 2px solid; border-color: #fff #000 #000 #fff; width: 400px; padding: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .title-bar { background: #000080; color: white; padding: 2px 5px; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 10px; border: 2px inset #fff; margin: 2px; }
        
        input { border: 2px inset #fff; padding: 4px; width: 95%; margin-bottom: 10px; background: #fff; }
        button { background-color: #c0c0c0; border: 2px outset #fff; padding: 4px 12px; font-weight: bold; cursor: pointer; font-size: 12px; }
        button:active { border-style: inset; }
        
        #chat-flow { background: #fff; border: 2px inset #fff; height: 200px; overflow-y: scroll; margin-bottom: 10px; font-size: 12px; padding: 5px; }
        .msg { margin-bottom: 5px; border-bottom: 1px dotted #ccc; }
        .admin-tag { color: red; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="win95-window">
        <div class="title-bar"><span>ChatRoom 95</span><span>X</span></div>
        <div class="content">
            <div id="login-screen">
                <input type="text" id="room-input" placeholder="Raum Nummer...">
                <input type="password" id="token-input" placeholder="Admin Passwort...">
                <button onclick="enterRoom()">Wand betreten</button>
            </div>

            <div id="chat-screen" style="display:none;">
                <div id="chat-flow"></div>
                <input type="text" id="msg-input" placeholder="Nachricht...">
                <button onclick="sendMessage()">Senden</button>
                <div id="admin-tools" style="display:none; margin-top:10px;">
                    <hr>
                    <button onclick="alert('Funktion aktiv!')">Admin: Raum leeren</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Deine Konfiguration
        const REPO = "87z-ai/87z-ai";
        const ADMIN_PASS = "deinPasswort123"; // Setze hier dein Passwort fest
        let currentRoom = "";
        let isAdmin = false;

        function enterRoom() {
            currentRoom = `raum_${document.getElementById('room-input').value}.json`;
            isAdmin = (document.getElementById('token-input').value === ADMIN_PASS);
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'block';
            if(isAdmin) document.getElementById('admin-tools').style.display = 'block';
            loadMessages();
        }

        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            const sender = isAdmin ? '<span class="admin-tag">[Admin]</span>' : '';
            const displayMsg = `<div class="msg">${sender}${text}</div>`;
            
            document.getElementById('chat-flow').innerHTML += displayMsg;
            document.getElementById('msg-input').value = '';
            // Hinweis: Das Speichern in GitHub erfordert einen API-Token-Key, 
            // den wir in einer einfachen HTML-Seite aus Sicherheitsgründen nicht direkt speichern sollten.
        }
        
        async function loadMessages() {
            document.getElementById('chat-flow').innerText = "Verbindung zum ChatRoom...";
            // Hier würde der Ladevorgang von GitHub folgen
        }
    </script>
</body>
</html>
