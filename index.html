<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #c0c0c0; font-family: 'Tahoma', sans-serif; padding: 50px; }
        .window { width: 600px; background-color: #d4d4d4; border: 2px solid #000; border-left-color: #fff; border-top-color: #fff; padding: 3px; margin: auto; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 3px 5px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; }
        .content { padding: 10px; }
        #chat-window { width: 100%; height: 250px; background: white; border: 2px inset #000; overflow-y: auto; padding: 5px; margin-bottom: 10px; font-family: 'Courier New', monospace; color: #000080; }
        .controls { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        input { flex-grow: 1; padding: 5px; border: 2px inset #000; }
        select { padding: 2px; border: 2px inset #000; background: #fff; }
        button { background-color: #d4d4d4; border: 2px outset #fff; border-right-color: #000; border-bottom-color: #000; padding: 2px 10px; cursor: pointer; }
        button:active { border-style: inset; border-right-color: #fff; border-bottom-color: #fff; }
        .admin-section { border: 2px dashed #808080; padding: 10px; background: #c0c0c0; margin-bottom: 10px; display: none; }
        .status { font-size: 11px; color: #444; font-family: monospace; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar"><span>ChatRoom 95</span></div>
    <div class="content">
        <div class="controls">
            Raum wählen: 
            <select id="room-select" onchange="changeRoom()">
                <option value="raum_1.json">Raum 1</option>
                <option value="raum_2.json">Raum 2</option>
                <option value="raum_3.json">Raum 3</option>
            </select>
        </div>
        <div id="chat-window">Verbindung wird aufgebaut...</div>
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Nachricht...">
            <button onclick="sendMessage()">Senden</button>
        </div>

        <div id="admin-tools" class="admin-section">
            <strong>System-Verwaltung:</strong><br>
            <button onclick="sendGlobal()">Globale Durchsage</button>
            <button onclick="clearRoom()">Aktuellen Raum leeren</button>
        </div>

        <div class="status">
            <span id="status">[STATUS: Initialisiere...]</span>
            <button onclick="requestAdmin()" style="font-size: 10px;">Admin Login</button>
        </div>
    </div>
</div>

<script>
    const GITHUB_TOKEN = "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";
    const ADMIN_PASS = "X7#mK!2pQ$9vWL";
    const REPO = "87z-ai/87z-ai";
    
    let currentFile = "raum_1.json";
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
    if(isAdmin) document.getElementById('admin-tools').style.display = 'block';

    function changeRoom() {
        currentFile = document.getElementById('room-select').value;
        loadMessages();
    }

    function requestAdmin() {
        if(isAdmin) return;
        const input = prompt("Admin Passwort:");
        if(input === ADMIN_PASS) {
            isAdmin = true;
            sessionStorage.setItem('isAdmin', 'true');
            document.getElementById('admin-tools').style.display = 'block';
        }
    }

    async function api(file, method, body = null) {
        const url = `https://api.github.com/repos/${REPO}/contents/${file}?t=${Date.now()}`;
        return await fetch(url, {
            method: method,
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : null
        });
    }

    async function loadMessages() {
        try {
            const res = await api(currentFile, 'GET');
            if(res.status === 404) {
                await api(currentFile, 'PUT', { message: "Init", content: btoa("[]") });
                return;
            }
            const data = await res.json();
            const msgs = JSON.parse(atob(data.content));
            document.getElementById('chat-window').innerHTML = msgs.join('<br>');
            document.getElementById('status').innerText = "[STATUS: Verbunden (" + currentFile + ")]";
        } catch(e) { document.getElementById('status').innerText = "[STATUS: Fehler]"; }
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        const res = await api(currentFile, 'GET');
        const data = await res.json();
        let msgs = JSON.parse(atob(data.content));
        msgs.push(`${isAdmin ? '[ADMIN] ' : ''}[${new Date().toLocaleTimeString().slice(0,5)}]: ${input.value}`);
        await api(currentFile, 'PUT', { message: "Msg", content: btoa(JSON.stringify(msgs)), sha: data.sha });
        input.value = '';
        loadMessages();
    }

    async function sendGlobal() {
        const text = prompt("Globale Nachricht:");
        if(!text) return;
        const rooms = ["raum_1.json", "raum_2.json", "raum_3.json"];
        for(let room of rooms) {
            try {
                const res = await api(room, 'GET');
                const data = await res.json();
                let msgs = JSON.parse(atob(data.content));
                msgs.push(`[SYSTEM]: ${text}`);
                await api(room, 'PUT', { message: "Global", content: btoa(JSON.stringify(msgs)), sha: data.sha });
            } catch(e) {}
        }
    }

    async function clearRoom() {
        const res = await api(currentFile, 'GET');
        const data = await res.json();
        await api(currentFile, 'PUT', { message: "Reset", content: btoa("[]"), sha: data.sha });
        loadMessages();
    }

    loadMessages();
    setInterval(loadMessages, 3000);
</script>
</body>
</html>
