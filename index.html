<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #3b8e8f; font-family: 'Courier New', monospace; padding: 20px; }
        .window { background-color: #d4d4d4; border: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; padding: 2px; max-width: 600px; margin: auto; }
        .title-bar { background: #000080; color: white; padding: 2px 5px; font-weight: bold; border: 1px solid #000; }
        .content { padding: 15px; }
        #global-banner { background: #e0e0e0; border: 1px solid #000; color: #000080; padding: 5px; margin-bottom: 10px; font-weight: bold; display: none; }
        #chat-window { background: #FFFFFF; border: 2px inset #808080; height: 300px; overflow-y: scroll; padding: 5px; margin-bottom: 10px; color: #000; }
        input, button { border: 1px solid #000; background: #d4d4d4; padding: 2px 5px; }
        button:active { border: 1px inset #000; }
        .admin-section { border: 1px dashed #000080; padding: 10px; margin-top: 10px; display: none; }
        #login-screen { display: block; }
        #chat-screen { display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="window">
    <div class="title-bar">Anmeldung</div>
    <div class="content">
        Raumnummer: <input type="text" id="login-room" value="1"><br><br>
        Admin-Token (optional): <input type="password" id="login-token"><br><br>
        <button onclick="doLogin()">Anmelden</button>
    </div>
</div>

<div id="chat-screen" class="window">
    <div class="title-bar">ChatRoom 95 - <span id="room-title"></span></div>
    <div class="content">
        <div id="global-banner"></div>
        <div id="chat-window">Verbindung...</div>
        <input type="text" id="msg-input" placeholder="Nachricht...">
        <button onclick="sendMessage()">Senden</button>
        <button onclick="location.reload()">Verlassen</button>

        <div id="admin-section" class="admin-section">
            <strong>ADMIN-WERKZEUGE:</strong><br>
            <button onclick="sendGlobal()">Globale Durchsage</button>
            <button onclick="clearRoom()">Raum leeren</button>
            <button onclick="resetAllRooms()" style="color: red;">KOMPLETT-RESET</button>
        </div>
    </div>
</div>

<script>
    let token = "";
    let roomId = "";
    const repo = "87z-ai/wall-data";

    function doLogin() {
        roomId = document.getElementById('login-room').value;
        token = document.getElementById('login-token').value;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'block';
        document.getElementById('room-title').innerText = "Raum " + roomId;
        if (token) document.getElementById('admin-section').style.display = 'block';
        loadMessages();
        loadGlobal();
    }

    async function api(path) {
        const url = `https://api.github.com/repos/${repo}/contents/${path}`;
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        const response = await fetch(url, { headers });
        return response.ok ? await response.json() : null;
    }

    async function loadMessages() {
        const file = await api(`raum_${roomId}.json`);
        document.getElementById('chat-window').innerHTML = file ? JSON.parse(atob(file.content)).join('<br>') : "Leer.";
    }

    async function sendMessage() {
        const roomFile = `raum_${roomId}.json`;
        const file = await api(roomFile);
        let msgs = file ? JSON.parse(atob(file.content)) : [];
        msgs.push(`User [${new Date().toLocaleTimeString()}]: ${document.getElementById('msg-input').value}`);
        await fetch(`https://api.github.com/repos/${repo}/contents/${roomFile}`, {
            method: 'PUT',
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content: btoa(JSON.stringify(msgs)), sha: file ? file.sha : undefined })
        });
        loadMessages();
    }

    async function loadGlobal() {
        const file = await api('global_system.json');
        if (file) {
            const data = JSON.parse(atob(file.content));
            if (data.global_announcement) {
                document.getElementById('global-banner').innerText = data.global_announcement;
                document.getElementById('global-banner').style.display = 'block';
            }
        }
    }

    async function sendGlobal() {
        const text = prompt("Durchsage:");
        const file = await api('global_system.json');
        await fetch(`https://api.github.com/repos/${repo}/contents/global_system.json`, {
            method: 'PUT',
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Global", content: btoa(JSON.stringify({ global_announcement: text })), sha: file.sha })
        });
        loadGlobal();
    }

    async function clearRoom() {
        const file = await api(`raum_${roomId}.json`);
        await fetch(`https://api.github.com/repos/${repo}/contents/raum_${roomId}.json`, {
            method: 'PUT',
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Clear", content: btoa(JSON.stringify([])), sha: file.sha })
        });
        loadMessages();
    }

    async function resetAllRooms() {
        if(!confirm("ALLES LÖSCHEN?")) return;
        for(let i=1; i<=3; i++) {
            const file = await api(`raum_${i}.json`);
            if(file) {
                await fetch(`https://api.github.com/repos/${repo}/contents/raum_${i}.json`, {
                    method: 'PUT',
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "Reset", content: btoa(JSON.stringify([])), sha: file.sha })
                });
            }
        }
        loadMessages();
    }
</script>
</body>
</html>
