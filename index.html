<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #c0c0c0; font-family: 'MS Sans Serif', sans-serif; padding: 20px; }
        .container { width: 600px; margin: 0 auto; border: 2px solid #000; padding: 15px; background: #ececec; }
        h1 { font-size: 20px; border-bottom: 2px solid #000; margin: 0 0 10px 0; }
        #chat-window { width: 100%; height: 300px; background: #fff; border: 2px inset #000; overflow-y: auto; padding: 5px; margin-bottom: 10px; font-size: 14px; color: #000080; }
        .input-area { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex-grow: 1; padding: 5px; border: 2px inset #000; }
        button { padding: 4px 12px; cursor: pointer; }
        .status { font-size: 11px; color: #444; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>ChatRoom 95</h1>
    <div id="chat-window">Verbindung wird aufgebaut...</div>
    
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Nachricht eingeben...">
        <button onclick="sendMessage()">Senden</button>
    </div>
    
    <div class="status" id="status">[STATUS: Initialisiere...]</div>
</div>

<script>
    // DEINE DATEN
    const GITHUB_TOKEN = "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";
    const REPO = "87z-ai/87z-ai";
    const FILE = "raum_1.json";

    async function loadMessages() {
        const url = `https://api.github.com/repos/${REPO}/contents/${FILE}?t=${Date.now()}`;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` }});
            
            if (res.status === 404) {
                // Datei existiert nicht -> Erstelle sie automatisch
                await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Initialisierung", content: btoa("[]") })
                });
                return;
            }

            const data = await res.json();
            const msgs = JSON.parse(atob(data.content));
            document.getElementById('chat-window').innerHTML = msgs.join('<br>');
            document.getElementById('status').innerText = "[STATUS: Verbunden]";
        } catch(e) {
            document.getElementById('status').innerText = "[STATUS: Fehler - Token/Repo prüfen]";
            console.error(e);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value;
        if(!text) return;

        // 1. Daten holen
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?t=${Date.now()}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` }});
        const data = await res.json();
        let msgs = JSON.parse(atob(data.content));
        
        // 2. Nachricht hinzufügen
        msgs.push(`[${new Date().toLocaleTimeString().slice(0,5)}]: ${text}`);

        // 3. Speichern
        await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: "Neue Nachricht", 
                content: btoa(JSON.stringify(msgs)), 
                sha: data.sha 
            })
        });
        
        input.value = '';
        loadMessages();
    }

    // Automatisches Update alle 3 Sekunden
    loadMessages();
    setInterval(loadMessages, 3000);
</script>
</body>
</html>
