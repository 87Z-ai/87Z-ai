<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #c0c0c0; font-family: 'Tahoma', sans-serif; padding: 50px; }
        
        /* Fenster-Design */
        .window { width: 600px; background-color: #d4d4d4; border: 2px solid #000; border-left-color: #fff; border-top-color: #fff; padding: 3px; margin: auto; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 3px 5px; font-weight: bold; font-size: 14px; }
        .content { padding: 10px; }
        
        /* Chat-Fenster */
        #chat-window { width: 100%; height: 300px; background: white; border: 2px inset #000; overflow-y: auto; padding: 5px; margin-bottom: 10px; font-family: 'Courier New', monospace; color: #000080; }
        
        /* Eingabe-Bereich */
        .input-area { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 5px; border: 2px inset #000; }
        button { background-color: #d4d4d4; border: 2px outset #fff; border-right-color: #000; border-bottom-color: #000; padding: 2px 10px; cursor: pointer; font-family: 'Tahoma', sans-serif; }
        button:active { border-style: inset; border-right-color: #fff; border-bottom-color: #fff; border-left-color: #000; border-top-color: #000; }
        
        /* Status */
        .status { font-size: 11px; color: #444; font-family: monospace; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">ChatRoom 95</div>
    <div class="content">
        <div id="chat-window">Verbindung wird aufgebaut...</div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Nachricht eingeben...">
            <button onclick="sendMessage()">Senden</button>
        </div>
        <div class="status" id="status">[STATUS: Initialisiere...]</div>
    </div>
</div>

<script>
    // --- KONFIGURATION ---
    const GITHUB_TOKEN = "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"; 
    const REPO = "87z-ai/87z-ai";
    const FILE = "raum_1.json";

    // Zentrale Funktion für API-Calls
    async function api(method, body = null) {
        const url = `https://api.github.com/repos/${REPO}/contents/${FILE}?t=${Date.now()}`;
        const headers = { 
            'Authorization': `token ${GITHUB_TOKEN}`, 
            'Content-Type': 'application/json' 
        };
        const config = { method: method, headers: headers };
        if (body) config.body = JSON.stringify(body);
        
        return await fetch(url, config);
    }

    async function loadMessages() {
        try {
            const res = await api('GET');
            if (res.status === 404) {
                await api('PUT', { message: "Init", content: btoa("[]") });
                return;
            }
            const data = await res.json();
            const msgs = JSON.parse(atob(data.content));
            document.getElementById('chat-window').innerHTML = msgs.join('<br>');
            document.getElementById('status').innerText = "[STATUS: Verbunden]";
        } catch(e) {
            document.getElementById('status').innerText = "[STATUS: Fehler - Token prüfen!]";
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        
        const res = await api('GET');
        const data = await res.json();
        let msgs = JSON.parse(atob(data.content));
        
        msgs.push(`[${new Date().toLocaleTimeString().slice(0,5)}]: ${input.value}`);
        
        await api('PUT', { 
            message: "Update", 
            content: btoa(JSON.stringify(msgs)), 
            sha: data.sha 
        });
        
        input.value = '';
        loadMessages();
    }

    loadMessages();
    setInterval(loadMessages, 3000);
</script>
</body>
</html>
