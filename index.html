<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #000080; font-family: 'MS Sans Serif', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .win95-window { background-color: #0000AA; border: 2px solid #5555FF; width: 400px; padding: 2px; color: white; }
        .title-bar { background: #000080; color: white; padding: 3px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #5555FF; }
        .content { padding: 15px; }
        input { border: 2px inset #fff; padding: 5px; width: 90%; margin-bottom: 10px; color: black; }
        button { background-color: #0000AA; border: 2px outset #5555FF; padding: 5px 15px; color: white; font-weight: bold; cursor: pointer; }
        #chat-flow { background: #000044; border: 2px inset #5555FF; height: 200px; overflow-y: scroll; margin-bottom: 10px; padding: 5px; color: #00FF00; }
        .admin-tag { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="win95-window">
        <div class="title-bar">ChatRoom 95</div>
        <div class="content">
            <div id="login-screen">
                <input type="text" id="room-input" placeholder="Raum Nummer...">
                <input type="password" id="token-input" placeholder="Admin Passwort...">
                <button onclick="enterRoom()">Wand betreten</button>
            </div>
            <div id="chat-screen" style="display:none;">
                <div id="chat-flow"></div>
                <input type="text" id="msg-input" placeholder="Nachricht...">
                <button onclick="sendMessage()">Senden</button>
            </div>
        </div>
    </div>

    <script>
        // --- HIER AUSFÜLLEN ---
        const GITHUB_TOKEN = "DEIN_TOKEN_HIER_EINTRAGEN"; 
        const ADMIN_PASS = "DEIN_PASSWORT_HIER_EINTRAGEN";
        const REPO = "87z-ai/87z-ai";
        // ----------------------

        let isAdmin = false;
        let currentRoom = "";

        function enterRoom() {
            currentRoom = `raum_${document.getElementById('room-input').value}.json`;
            isAdmin = (document.getElementById('token-input').value === ADMIN_PASS);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'block';
            document.getElementById('chat-flow').innerHTML = "Verbindung zu " + currentRoom + "...";
        }

        async function sendMessage() {
            const text = document.getElementById('msg-input').value;
            const sender = isAdmin ? '<span class="admin-tag">[Admin]</span> ' : '';
            document.getElementById('chat-flow').innerHTML += `<div>${sender}${text}</div>`;
            document.getElementById('msg-input').value = '';
            
            // Logik zum Speichern bei GitHub kommt hier rein
            // Da dies ein komplexer API-Aufruf ist, achte darauf, 
            // dass der Token Schreibrechte ("repo") hat.
        }
    </script>
</body>
</html>
