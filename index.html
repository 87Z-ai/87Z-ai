<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Schul-Live-Wall V1.0</title>
    <style>
        body { background-color: #c0c0c0; font-family: 'Arial', sans-serif; padding: 20px; }
        .container { width: 800px; margin: 0 auto; }
        h1 { font-size: 24px; border-bottom: 2px solid #000; margin-bottom: 5px; }
        .room-info { margin-bottom: 15px; font-size: 18px; }
        #chat-window { width: 100%; height: 400px; background: white; border: 2px inset #000; margin-bottom: 10px; overflow-y: auto; padding: 10px; font-weight: bold; color: #000080; }
        .controls { margin-bottom: 20px; }
        input[type="text"] { width: 680px; padding: 5px; border: 2px inset #000; }
        button { padding: 5px 15px; cursor: pointer; }
        .admin-panel { border: 2px solid #000; padding: 15px; background: #d0d0d0; }
        .status-bar { margin-top: 10px; font-family: monospace; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Schul-Live-Wall V1.0</h1>
    <div class="room-info" id="room-header">Raum: 1</div>
    
    <div id="chat-window">Initialisiere...</div>
    
    <div class="controls">
        Nachricht: <input type="text" id="msg-input" placeholder="...">
        <button onclick="sendMessage()">Senden</button>
    </div>

    <div class="admin-panel" id="admin-tools" style="display:none;">
        <strong>System-Verwaltung Werkzeuge:</strong><br><br>
        <button>Globale Durchsage</button>
        <button onclick="clearRoom()">Diesen Raum löschen</button>
        <button onclick="fullReset()">Komplett-Reset</button>
    </div>

    <div class="status-bar" id="status">[STATUS: Initialisiere...]</div>
</div>

<script>
    const GITHUB_TOKEN = "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";
    const ADMIN_PASS = "X7#mK!2pQ$9vWL";
    const REPO = "87z-ai/87z-ai";
    const FILE = "raum_1.json"; // Ändere dies für andere Räume
    
    let isAdmin = false;
    let sha = "";

    // Passwort-Abfrage
    const input = prompt("Passwort für Admin-Zugang:");
    if(input === ADMIN_PASS) {
        isAdmin = true;
        document.getElementById('admin-tools').style.display = 'block';
        document.getElementById('room-header').innerText = "Raum: 1 [ADMINISTRATOR]";
    }

    async function loadMessages() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }
            });

            // Wenn Datei nicht da -> Automatisch erstellen
            if (res.status === 404) {
                await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Auto-Init Raum", content: btoa("[]") })
                });
                return;
            }

            const data = await res.json();
            sha = data.sha;
            const msgs = JSON.parse(atob(data.content));
            document.getElementById('chat-window').innerHTML = msgs.join('<br>');
            document.getElementById('status').innerText = "[STATUS: Verbunden]";
        } catch(e) {
            document.getElementById('status').innerText = "[STATUS: Fehler beim Laden]";
        }
    }

    async function sendMessage() {
        const text = document.getElementById('msg-input').value;
        if(!text) return;
        
        const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const sender = isAdmin ? `[ADMIN] ` : `[User] `;
        const msg = `${sender}[${timestamp}]: ${text}`;

        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }
        });
        const data = await res.json();
        let msgs = JSON.parse(atob(data.content));
        msgs.push(msg);

        await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Update", content: btoa(JSON.stringify(msgs)), sha: data.sha })
        });
        
        document.getElementById('msg-input').value = '';
        loadMessages();
    }

    function clearRoom() {
        fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Reset", content: btoa("[]"), sha: sha })
        }).then(() => loadMessages());
    }

    function fullReset() { location.reload(); }

    loadMessages();
    setInterval(loadMessages, 3000);
</script>
</body>
</html>
