<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #3b8e8f; font-family: Tahoma, sans-serif; padding: 20px; }
        .window { background-color: #d4d4d4; border: 2px solid #fff; border-right-color: #555; border-bottom-color: #555; padding: 3px; max-width: 600px; margin: auto; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 2px 5px; font-weight: bold; }
        .content { padding: 10px; }
        #chat-window { background: white; border: 2px inset #808080; height: 300px; overflow-y: scroll; padding: 5px; font-family: 'Courier New', monospace; margin-bottom: 10px; }
        .admin-section { border: 2px dashed #000080; padding: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="window">
    <div class="title-bar">ChatRoom 95</div>
    <div class="content">
        <label>Raumnummer:</label>
        <input type="text" id="room-id" value="1" style="width: 50px;">
        <button onclick="loadMessages()">Raum betreten</button>
        <div id="chat-window">Bitte Raum wählen und betreten.</div>
        <input type="text" id="msg-input" placeholder="Nachricht...">
        <button onclick="sendMessage()">Senden</button>
        <button id="login-btn" onclick="requestAdmin()">Admin Login</button>

        <div id="admin-section" class="admin-section">
            <strong>System-Verwaltung:</strong><br>
            <button onclick="sendGlobal()">Globale Durchsage</button>
            <button onclick="clearRoom()">Diesen Raum leeren</button>
        </div>
        <div id="status">[STATUS: Bereit]</div>
    </div>
</div>

<script>
    let token = "";
    const repo = "87z-ai/wall-data";

    function requestAdmin() {
        token = prompt("Admin Passwort:");
        if (token) document.getElementById('admin-section').style.display = 'block';
    }

    async function api(path, method, body) {
        const url = `https://api.github.com/repos/${repo}/contents/${path}`;
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        const response = await fetch(url, { headers });
        return response.ok ? await response.json() : null;
    }

    async function sendMessage() {
        const roomFile = `raum_${document.getElementById('room-id').value}.json`;
        const file = await api(roomFile, 'GET');
        let msgs = file ? JSON.parse(atob(file.content)) : [];
        msgs.push(`User [${new Date().toLocaleTimeString()}]: ${document.getElementById('msg-input').value}`);
        
        await fetch(`https://api.github.com/repos/${repo}/contents/${roomFile}`, {
            method: 'PUT',
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content: btoa(JSON.stringify(msgs)), sha: file ? file.sha : undefined })
        });
        loadMessages();
    }

    async function clearRoom() {
        const roomFile = `raum_${document.getElementById('room-id').value}.json`;
        const file = await api(roomFile, 'GET');
        if (file) {
            await fetch(`https://api.github.com/repos/${repo}/contents/${roomFile}`, {
                method: 'PUT',
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Clear", content: btoa(JSON.stringify([])), sha: file.sha })
            });
            loadMessages();
        }
    }

    async function loadMessages() {
        const roomFile = `raum_${document.getElementById('room-id').value}.json`;
        const file = await api(roomFile, 'GET');
        document.getElementById('chat-window').innerHTML = file ? JSON.parse(atob(file.content)).join('<br>') : "Raum leer oder existiert nicht.";
        document.getElementById('status').innerText = "[STATUS: Raum " + document.getElementById('room-id').value + " geladen]";
    }
</script>
</body>
</html>
