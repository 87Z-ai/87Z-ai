<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChatRoom 95</title>
    <style>
        body { background-color: #c0c0c0; font-family: 'MS Sans Serif', sans-serif; padding: 20px; }
        .container { width: 600px; margin: 0 auto; border: 2px solid #000; padding: 15px; background: #ececec; }
        h1 { font-size: 20px; border-bottom: 2px solid #000; margin: 0 0 10px 0; }
        #chat-window { width: 100%; height: 300px; background: #fff; border: 2px inset #000; overflow-y: auto; padding: 5px; margin-bottom: 10px; font-size: 14px; color: #000080; }
        .input-area { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 5px; }
        .admin-section { border-top: 2px solid #555; padding-top: 10px; margin-top: 10px; }
        .btn-group { display: flex; gap: 5px; margin-top: 5px; }
        .status { font-size: 11px; color: #444; margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h1>ChatRoom 95</h1>
    <div id="room-header">Raum: 1</div>
    <div id="chat-window">Verbindung wird aufgebaut...</div>
    
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Deine Nachricht...">
        <button onclick="sendMessage()">Senden</button>
    </div>

    <div id="admin-tools" class="admin-section" style="display:none;">
        <strong>Admin-Werkzeuge:</strong>
        <div class="btn-group">
            <button onclick="sendGlobal()">Globale Durchsage</button>
            <button onclick="clearRoom()">Raum leeren</button>
            <button onclick="location.reload()">Reset</button>
        </div>
    </div>

    <div class="status">
        <span id="status">[STATUS: Initialisiere...]</span>
        <button onclick="requestAdmin()" style="font-size: 10px;">Admin Login</button>
    </div>
</div>

<script>
    const GITHUB_TOKEN = "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";
    const ADMIN_PASS = "X7#mK!2pQ$9vWL";
    const REPO = "87z-ai/87z-ai";
    const FILE = "raum_1.json";
    let isAdmin = false;

    function requestAdmin() {
        const input = prompt("Admin Passwort:");
        if(input === ADMIN_PASS) {
            isAdmin = true;
            document.getElementById('admin-tools').style.display = 'block';
            document.getElementById('room-header').innerText = "Raum: 1 [ADMINISTRATOR]";
        }
    }

    async function loadMessages() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }});
            if (res.status === 404) {
                await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { method: 'PUT', headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "Init", content: btoa("[]") }) });
                return;
            }
            const data = await res.json();
            const msgs = JSON.parse(atob(data.content));
            document.getElementById('chat-window').innerHTML = msgs.join('<br>');
            document.getElementById('status').innerText = "[STATUS: Verbunden]";
        } catch(e) { document.getElementById('status').innerText = "[STATUS: Fehler]"; }
    }

    async function sendMessage() {
        const text = document.getElementById('msg-input').value;
        if(!text) return;
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }});
        const data = await res.json();
        let msgs = JSON.parse(atob(data.content));
        msgs.push(`${isAdmin ? '[ADMIN] ' : ''}[${new Date().toLocaleTimeString().slice(0,5)}]: ${text}`);
        await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { method: 'PUT', headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "Msg", content: btoa(JSON.stringify(msgs)), sha: data.sha }) });
        document.getElementById('msg-input').value = '';
        loadMessages();
    }

    async function sendGlobal() {
        const text = prompt("Globale Nachricht:");
        if(!text) return;
        alert("Nachricht gesendet: " + text);
    }

    async function clearRoom() {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }});
        const data = await res.json();
        await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, { method: 'PUT', headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "Reset", content: btoa("[]"), sha: data.sha }) });
        loadMessages();
    }

    loadMessages();
    setInterval(loadMessages, 3000);
</script>
</body>
</html>
